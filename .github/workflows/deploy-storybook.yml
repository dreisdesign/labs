name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [ main ]
    paths: 
      - 'labs-design-system/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: false  # Disabled - using local build with gh-pages branch instead
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'labs-design-system/package-lock.json'
          
      - name: Install dependencies
        run: cd labs-design-system && npm ci
        
      - name: Build Storybook
        run: cd labs-design-system && npm run build-storybook
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Prepare public directory for deployment
        run: |
          rm -rf public
          mkdir -p public
          # Copy essential root files for landing page
          cp index.html public/
          cp favicon.svg public/
          cp manifest.json public/
          cp sw.js public/
          cp LICENSE public/
          cp README.md public/
          # Copy Note app
          cp -r note public/
          # Copy Timer app
          cp -r timer public/
          # Copy Tracker app
          cp -r tracker public/
          # Copy Storybook to subfolder (last, to avoid overwrite)
          mkdir -p public/storybook
          cp -r labs-design-system/storybook-static/* public/storybook/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
